<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepSeek 代理测试</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        h1 { color: #333; margin-top: 0; }
        .status {
            padding: 10px;
            border-radius: 8px;
            margin: 20px 0;
        }
        .online { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .offline { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        input, button {
            padding: 12px;
            font-size: 16px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }
        input {
            flex: 1;
            margin-right: 10px;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
        }
        button:hover { background: #5a67d8; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .flex { display: flex; gap: 10px; margin: 20px 0; }
        .response {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            white-space: pre-wrap;
            font-family: monospace;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .test-btn {
            background: #28a745;
            margin-left: 10px;
        }
        .test-btn:hover { background: #218838; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🧠 DeepSeek 代理服务测试</h1>
        <p>测试您的 Vercel 代理是否正常工作</p>
        
        <div id="status" class="status">
            🔍 正在检测服务状态...
        </div>
        
        <div class="flex">
            <input type="text" id="message" placeholder="输入测试消息..." value="你好，请简单介绍一下自己">
            <button id="sendBtn" onclick="sendMessage()">发送消息</button>
            <button class="test-btn" onclick="testConnection()">测试连接</button>
        </div>
        
        <div id="response" class="response" style="display:none;">
            <strong>📝 AI 回复：</strong><br>
            <span id="reply"></span>
        </div>
        
        <div id="error" class="response" style="display:none; background:#f8d7da; color:#721c24;">
            <strong>❌ 错误：</strong><br>
            <span id="errorMsg"></span>
        </div>
        
        <div id="loading" style="display:none; text-align:center; margin:20px;">
            <div class="loading"></div> 正在思考中...
        </div>
        
        <hr style="margin: 20px 0;">
        <p style="font-size: 12px; color: #666; text-align: center;">
            ✅ 如果看到 AI 回复，说明代理服务正常<br>
            ❌ 如果显示错误，请检查 Vercel 部署日志
        </p>
    </div>

    <script>
        // 使用相对路径调用 API
        const API_URL = '/api/chat';
        
        async function testConnection() {
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = '🔍 正在测试 API 连接...';
            statusDiv.className = 'status';
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: "deepseek-chat",
                        messages: [{ role: "user", content: "测试连接" }],
                        max_tokens: 10
                    })
                });
                
                if (response.ok) {
                    statusDiv.innerHTML = '✅ API 连接正常！可以发送消息了。';
                    statusDiv.className = 'status online';
                } else {
                    const error = await response.text();
                    statusDiv.innerHTML = `⚠️ API 响应异常: ${response.status} - ${error.substring(0, 100)}`;
                    statusDiv.className = 'status offline';
                }
            } catch (error) {
                statusDiv.innerHTML = `❌ 无法连接到 API: ${error.message}<br>请确保 Vercel 服务正在运行。`;
                statusDiv.className = 'status offline';
            }
        }
        
        async function sendMessage() {
            const message = document.getElementById('message').value.trim();
            if (!message) {
                alert('请输入消息');
                return;
            }
            
            const sendBtn = document.getElementById('sendBtn');
            const loadingDiv = document.getElementById('loading');
            const responseDiv = document.getElementById('response');
            const errorDiv = document.getElementById('error');
            const replySpan = document.getElementById('reply');
            const errorMsgSpan = document.getElementById('errorMsg');
            
            // 重置显示
            responseDiv.style.display = 'none';
            errorDiv.style.display = 'none';
            loadingDiv.style.display = 'block';
            sendBtn.disabled = true;
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: "deepseek-chat",
                        messages: [{ role: "user", content: message }],
                        temperature: 0.7,
                        max_tokens: 500
                    })
                });
                
                loadingDiv.style.display = 'none';
                
                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`HTTP ${response.status}: ${errorText.substring(0, 200)}`);
                }
                
                const data = await response.json();
                const reply = data.choices[0].message.content;
                
                replySpan.textContent = reply;
                responseDiv.style.display = 'block';
                
            } catch (error) {
                loadingDiv.style.display = 'none';
                errorMsgSpan.textContent = error.message;
                errorDiv.style.display = 'block';
                console.error('错误详情:', error);
            } finally {
                sendBtn.disabled = false;
            }
        }
        
        // 页面加载时自动测试连接
        setTimeout(testConnection, 1000);
    </script>
</body>
</html>
