<!DOCTYPE html>
<html>
<head>
    <title>DeepSeek Proxy 测试</title>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 100px auto;
            padding: 20px;
            text-align: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .card {
            background: white;
            color: #333;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        h1 { color: #667eea; margin-top: 0; }
        .status {
            padding: 10px;
            border-radius: 8px;
            margin: 20px 0;
            font-weight: bold;
        }
        .online { background: #d4edda; color: #155724; }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin: 10px;
        }
        button:hover { background: #5a67d8; }
        input {
            padding: 10px;
            width: 80%;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            margin: 10px 0;
        }
        .response {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            text-align: left;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🧠 DeepSeek 代理服务</h1>
        <p>✅ 静态页面加载成功！</p>
        <p>代理服务正在运行中...</p>
        
        <div id="status" class="status">
            🔍 正在检测 API 状态...
        </div>
        
        <input type="text" id="message" placeholder="输入消息测试 AI" value="你好">
        <br>
        <button onclick="testAPI()">测试 AI 回复</button>
        <button onclick="checkStatus()">检查服务状态</button>
        
        <div id="result" class="response" style="display:none;"></div>
    </div>

    <script>
        const API_URL = '/api/chat';
        
        async function checkStatus() {
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = '🔍 正在检查...';
            statusDiv.className = 'status';
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: "deepseek-chat",
                        messages: [{ role: "user", content: "ping" }],
                        max_tokens: 5
                    })
                });
                
                if (response.ok) {
                    statusDiv.innerHTML = '✅ API 服务正常！可以发送消息。';
                    statusDiv.className = 'status online';
                } else {
                    statusDiv.innerHTML = `⚠️ API 响应: ${response.status}`;
                }
            } catch (error) {
                statusDiv.innerHTML = `❌ 无法连接: ${error.message}`;
            }
        }
        
        async function testAPI() {
            const message = document.getElementById('message').value;
            const resultDiv = document.getElementById('result');
            const statusDiv = document.getElementById('status');
            
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = '🤔 正在思考中...';
            statusDiv.innerHTML = '📡 发送请求中...';
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: "deepseek-chat",
                        messages: [{ role: "user", content: message }],
                        max_tokens: 200
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const data = await response.json();
                const reply = data.choices[0].message.content;
                
                resultDiv.innerHTML = `<strong>📝 AI 回复：</strong><br>${reply}`;
                statusDiv.innerHTML = '✅ 回复成功！';
                statusDiv.className = 'status online';
                
            } catch (error) {
                resultDiv.innerHTML = `<strong>❌ 错误：</strong><br>${error.message}<br><br>请检查 Vercel 部署日志。`;
                statusDiv.innerHTML = '❌ 请求失败';
            }
        }
        
        // 页面加载时自动检查
        setTimeout(checkStatus, 1000);
    </script>
</body>
</html>
